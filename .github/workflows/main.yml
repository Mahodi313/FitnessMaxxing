name: Main Branch CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Full Test Suite (Release Gate)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Sätt upp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Installera dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint
        run: npx expo lint

      - name: RLS tester
        run: npm run test:rls
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  expo-build:
    name: Expo Build Check (Release Gate)
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4

      - name: Sätt upp Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: app/package-lock.json

      - name: Installera dependencies
        run: npm ci

      - name: Expo export check
        run: npx expo export --platform ios --output-dir /tmp/expo-export
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

  create-release:
    name: Skapa Release
    runs-on: ubuntu-latest
    needs: [test, expo-build]
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout kod
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hämta senaste tag
        id: get-tag
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            NEW_TAG=$(echo $LATEST_TAG | awk -F. '{$NF = $NF + 1;} 1' | sed 's/ /./g')
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Skapa tag och release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const tag = '${{ steps.get-tag.outputs.new_tag }}';
            const sha = context.sha;

            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: sha
            });

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `FitnessMaxxing ${tag}`,
              body: `## Release ${tag}\n\nAutomatiskt skapad release från main-branch.\n\n### Installation\nInstallera via Expo Go eller TestFlight (när EAS Build är konfigurerat).`,
              draft: false,
              prerelease: false
            });

            console.log(`Release ${tag} skapad!`);
